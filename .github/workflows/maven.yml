name: Deploy Eureka Server (Infra)

on:
  push:
    branches: [ "dev", "main" ]
  pull_request:
    branches: [ "dev", "main" ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Build with Maven
        run: mvn clean package -DskipTests

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/eureka-server:latest

      - name: Deploy to Server via SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SSH_IP }}
          username: ${{ secrets.SSH_ID }}
          password: ${{ secrets.SSH_PW }}
          port: ${{ secrets.SSH_PORT }}
          script: |
            echo "🚀 유레카 서버(Infra) 배포 시작..."
            cd ~/www/nhnbook

            CONTAINER_NAME="team5_eureka_server"

            echo "🛑 기존 컨테이너 중지..."
            docker stop $CONTAINER_NAME || true
            docker rm $CONTAINER_NAME || true

            echo "📥 최신 이미지 다운로드..."
            docker-compose -f docker-compose-infra.yml pull team5_eureka_server

            echo "🔄 컨테이너 시작..."
            docker-compose -f docker-compose-infra.yml up -d --no-deps team5_eureka_server

            echo "🏥 헬스체크 확인 (포트 10481)..."
            HEALTHY=false
            for i in {1..10}; do
              STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://127.0.0.1:10481/actuator/health || echo "000")
              if [ "$STATUS" == "200" ]; then
                HEALTHY=true
                break
              fi
              echo "⏳ 시도 $i: 아직 준비되지 않음 ($STATUS)"
              sleep 5
            done

            if [ "$HEALTHY" != true ]; then
              echo "❌ 배포 실패: 컨테이너가 정상 상태가 아닙니다."
              exit 1
            fi

            docker image prune -f
            echo "✅ 유레카 서버 배포 완료!"
