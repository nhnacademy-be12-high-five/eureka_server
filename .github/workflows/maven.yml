name: Deploy Eureka Server (Infra)

on:
  push:
    branches: [ "feat/**" ,"main" ]
  pull_request:
    branches: [ "dev", "main" ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # 1. 코드 체크아웃
      - uses: actions/checkout@v4

      # 2. JDK 21 설정 (Dockerfile과 버전 통일)
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      # 3. Maven 빌드 (패키징)
      - name: Build with Maven
        run: mvn clean package -DskipTests

      # 4. Docker Hub 로그인
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # 5. Docker 이미지 빌드 및 푸시
      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/eureka-server:latest

      # 6. 서버 접속 및 배포 (인프라용 단순 재시작)
      - name: Deploy to Server via SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SSH_IP }}
          username: ${{ secrets.SSH_ID }}
          password: ${{ secrets.SSH_PW }}
          port: ${{ secrets.SSH_PORT }}
          script: |
            echo "🚀 유레카 서버(Infra) 배포를 시작합니다..."
            
            # 프로젝트 폴더로 이동 (본인의 실제 경로로 수정 필요)
            cd ~/www/nhnbook
            
            # 1. 최신 이미지 다운로드 (인프라 파일 사용)
            docker-compose -f docker-compose-infra.yml pull eureka_server
            
            # 2. 유레카 서버만 쏙 골라서 재시작 (다른 인프라는 건드리지 않음)
            # --no-deps: 의존성 있는 다른 컨테이너를 재시작하지 않음
            docker-compose -f docker-compose-infra.yml up -d --no-deps eureka_server
            
            # 3. 미사용 이미지 정리
            docker image prune -f
            
            echo "✅ 유레카 서버 배포가 완료되었습니다!"