name: Deploy Eureka Server (Infra)

on:
  push:
    branches: [ "dev", "main" ]
  pull_request:
    branches: [ "dev", "main" ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # 1. 코드 체크아웃
      - uses: actions/checkout@v4

      # 2. JDK 21 설정
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      # 3. Maven 빌드
      - name: Build with Maven
        run: mvn clean package -DskipTests

      # 4. Docker Hub 로그인
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # 5. Docker 이미지 빌드 및 푸시
      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/eureka-server:latest

      # 6. 서버 접속 및 배포
      - name: Deploy to Server via SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SSH_IP }}
          username: ${{ secrets.SSH_ID }}
          password: ${{ secrets.SSH_PW }}
          port: ${{ secrets.SSH_PORT }}
          script: |
            echo "🚀 유레카 서버(Infra) 배포 시작..."
            cd ~/www/nhnbook

            CONTAINER_NAME="team5-eureka-server"

            # 기존 컨테이너 종료 및 제거
            echo "🛑 기존 컨테이너 중지 및 제거..."
            docker stop $CONTAINER_NAME || true
            docker rm $CONTAINER_NAME || true

            # 최신 이미지 pull
            echo "📥 최신 이미지 다운로드..."
            docker-compose -f docker-compose.yml pull eureka_server

            # 컨테이너 시작
            echo "🔄 컨테이너 시작..."
            docker-compose -f docker-compose.yml up -d eureka_server

            # 헬스 체크 (선택)
            echo "🏥 헬스 체크 확인 (포트 10481)..."
            HEALTHY=false
            for i in {1..10}; do
              STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://127.0.0.1:10481/actuator/health || echo "000")
              if [ "$STATUS" == "200" ]; then
                HEALTHY=true
                break
              fi
              echo "⏳ 시도 $i: 아직 준비되지 않음 ($STATUS)"
              sleep 5
            done

            if [ "$HEALTHY" != true ]; then
              echo "❌ 배포 실패: 컨테이너가 정상 상태가 아닙니다."
              exit 1
            fi

            docker image prune -f
            echo "✅ 유레카 서버 배포 완료!"
