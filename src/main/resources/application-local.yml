spring:
  application:
    name: eureka-server
server:
  port: 8761

eureka:
  instance:
    hostname: localhost
    prefer-ip-address: false
  client:
    register-with-eureka: false   # 로컬에서는 등록하지 않음
    fetch-registry: false         # 레지스트리 가져오지 않음
    service-url:
      defaultZone: http://localhost:8761/eureka/
  server:
    wait-time-in-ms-when-sync-empty: 0
    enable-self-preservation: false  # 로컬 테스트라 self-preservation 꺼도 됨
